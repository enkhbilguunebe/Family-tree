<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mongolian Bloodline Family Tree</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bgShade"></div>

  <header class="topbar">
    <div>
      <p class="eyebrow">Монгол удам • Bloodline tree</p>
      <h1>Family Tree</h1>
    </div>
    <div class="controls" aria-label="Tree controls">
      <button id="zoomOut" title="Zoom out">−</button>
      <button id="resetView" title="Reset view">Reset</button>
      <button id="zoomIn" title="Zoom in">+</button>
    </div>
  </header>

  <main id="viewport" class="viewport">
    <div id="world" class="world">
      <svg id="lines" class="lines" aria-hidden="true"></svg>
      <div id="nodes" class="nodes"></div>
      <div id="cards" class="cards"></div>
    </div>
  </main>

  <section class="legend">
    <span><i class="dot blood"></i> Big gold circle = bloodline</span>
    <span><i class="dot spouse"></i> Smaller silver circle = husband / wife</span>
    <span>Click a person to open the golden gerege profile.</span>
  </section>

  <script src="script.js"></script>
</body>
</html>
